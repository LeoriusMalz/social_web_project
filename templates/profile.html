<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль</title>
    <link rel="stylesheet" href="/static/styles/sidebar.css">
    <link rel="stylesheet" href="/static/styles/profile.css">
</head>
<body>
<div class="app-layout">
    {% include '_sidebar.html' %}

    <main class="profile-shell">
        <section class="profile-card">
            <div id="avatar" class="profile-avatar"></div>

            <h1 id="full-name" class="profile-name">Загрузка...</h1>

            <div class="profile-btn-block">
                <button id="nickname-btn" class="nickname-btn" type="button" title="Скопировать ссылку на профиль">
                    @nickname
                </button>

                <button id="more-btn" class="more-btn" type="button">подробнее...</button>
            </div>

            <div id="relation-controls" class="relation-controls"></div>

            <div class="stats-block">
                <button class="stat-row stat-row--clickable" id="friends-stat-btn" type="button">
                    <span>👥</span>
                    <b><span id="friends-count">0 друзей</span></b>
                </button>
                <button class="stat-row stat-row--clickable" id="followers-stat-btn" type="button">
                    <span>🔔</span>
                    <b><span id="followers-count">0 подписчиков</span></b>
                </button>
            </div>
        </section>
    </main>
</div>

<div id="details-overlay" class="details-overlay" aria-hidden="true">
    <div class="details-modal" role="dialog" aria-modal="true" aria-label="Дополнительная информация">
        <h2>Информация</h2>
        <div id="details-list" class="details-list"></div>
    </div>
</div>

<div id="people-overlay" class="details-overlay" aria-hidden="true">
    <div class="details-modal details-modal--wide" role="dialog" aria-modal="true" aria-label="Список пользователей">
        <h2 id="people-title">Список</h2>
        <div id="people-list" class="people-list"></div>
    </div>
</div>

<script>
    const userId = {{ user_id }};
    const currentUserId = {{ current_user_id }};
    const isOwner = {{ 'true' if is_owner else 'false' }};
</script>

<script src="/static/scripts/sidebar.js"></script>
<script src="/static/scripts/profile.js"></script>
</body>
</html>
